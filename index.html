<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🐣 JeabTool - Fix Text 🐣</title>

    <link rel="icon" href="Jeablogo.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Background -->
    <div class="background">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="cloud cloud3"></div>
    </div>

    <!-- Main Card -->

    <main class="card">

        <img src="Jeablogo.png" class="logo" alt="Jeab Logo">

        <h1>🐣 JeabTool - Fix Text 🐣</h1>

        <p class="subtitle">
            🐣 วางข้อความสิไอโง่ 🐣
        </p>

        <!-- Input -->

        <section class="box">

            <label for="input">

                📝 ข้อความต้นฉบับ

            </label>

            <textarea
                id="input"
                placeholder="พิมพ์หรือวางข้อความที่นี่..."
                spellcheck="false"></textarea>

        </section>

        <!-- Buttons -->

        <div class="button-group">

            <button id="clearBtn">

                🧹 ล้างข้อความ

            </button>

            <button id="copyBtn">

                📋 คัดลอกผลลัพธ์

            </button>

        </div>

        <!-- Output -->

        <section class="box">

            <label for="output">

                ✅ ผลลัพธ์

            </label>

            <textarea
                id="output"
                readonly
                placeholder="ผลลัพธ์จะปรากฏที่นี่"></textarea>

        </section>

        <footer>

            Made with ❤️ by
            <strong>JeabDestiny</strong>

        </footer>

    </main>

    <!-- Toast -->

    <div id="toast">

        🐣 คัดลอกแล้วจ้า~

    </div>

    <script src="script.js"></script>

</body>

</html>
